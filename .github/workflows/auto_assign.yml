name: Auto Assign

# config 는 .github/auto_assign.yml (기본 경로) 를 자동으로 읽음.
# - reviewer: 작성자 제외한 나머지 풀 할당
# - assignee: PR 작성자(author) 할당 → issues: write 필요
# - skipKeywords(wip) / runOnDraft(false) → 스킵
on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  add-reviews:
    name: Auto-assign reviewers & assignee
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.2